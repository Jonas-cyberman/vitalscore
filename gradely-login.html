<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradely Admin | Login</title>
    
    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- SUPABASE SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        head { display: none !important; }
        :root {
            --bg: #f8f9fb;
            --surface: #ffffff;
            --primary: #000000;
            --secondary: #64748b;
            --accent: #f5a623;
            --border: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            padding: 48px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05);
            text-align: left;
        }

        .login-logo-box { 
            width: 48px; height: 48px; border-radius: 12px; background: var(--primary); 
            display: flex; align-items: center; justify-content: center; color: white; margin-bottom: 32px;
            font-weight: 800; font-size: 1.2rem;
        }
        .login-title { font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
        .login-step { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 40px; }

        .form-group { margin-bottom: 24px; }
        .label { display: block; font-weight: 700; font-size: 0.85rem; margin-bottom: 10px; color: var(--text-main); }
        .input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }
        .input:focus { border-color: var(--primary); background: white; outline: none; box-shadow: 0 0 0 4px rgba(0,0,0,0.03); }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 24px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            width: 100%;
            gap: 12px;
            font-family: inherit;
            font-size: 1rem;
        }
        .btn-black { background: var(--primary); color: white; }
        .btn-black:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.2); }
        .btn-black:disabled { opacity: 0.7; cursor: not-allowed; }

        .error-area { 
            background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 10px; 
            font-size: 0.85rem; margin-top: 20px; display: none; text-align: center; font-weight: 600; 
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-logo-box">S</div>
        <h1 class="login-title">GRADELY</h1>
        <p class="login-step">Sign in to your admin dashboard</p>
        
        <form id="login-form">
            <div class="form-group">
                <label class="label">Email Address</label>
                <input type="email" id="login-email" class="input" placeholder="jane@example.com" required>
            </div>
            <div class="form-group">
                <label class="label">Password</label>
                <div style="position: relative;">
                    <input type="password" id="login-password" class="input" placeholder="••••••••" required>
                    <button type="button" onclick="togglePass()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.2rem;">👁️</button>
                </div>
            </div>
            <button type="submit" class="btn btn-black" id="login-btn">Sign In</button>
            <div id="login-error" class="error-area"></div>
        </form>
    </div>

    <script>
        // ─── SUPABASE INITIALIZATION ───
        const { createClient } = supabase;
        const db = createClient(
            'https://jklpeyertjndhqvndnct.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprbHBleWVydGpuZGhxdm5kbmN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MzM4MzEsImV4cCI6MjA4ODIwOTgzMX0.JbCzLTbeQpRwBJCYEOWqN5eZwktUrlyvNg7USZQR_dM'
        );

        // ─── AUTHENTICATION ───
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            const errorArea = document.getElementById('login-error');

            btn.disabled = true;
            btn.textContent = 'Verifying...';
            errorArea.style.display = 'none';

            try {
                const { data, error } = await db.auth.signInWithPassword({ email, password });
                if (error) throw error;
                await checkAdminUser(data.user.id);
            } catch (err) {
                errorArea.textContent = "Invalid email or password. Try again.";
                errorArea.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });

        async function checkAdminUser(userId) {
            const { data: admin, error } = await db
                .from('admin_users')
                .select('*')
                .eq('id', userId)
                .single();
                
            if (!admin || !admin.is_active) {
                await db.auth.signOut();
                const errorArea = document.getElementById('login-error');
                errorArea.textContent = admin ? 'Access denied. Account is suspended.' : 'Access denied. Contact Jonas Coleman for admin access.';
                errorArea.style.display = 'block';
                document.getElementById('login-btn').disabled = false;
                document.getElementById('login-btn').textContent = 'Sign In';
                return;
            }
            
            // Redirect to Dashboard
            window.location.href = 'gradely-admin.html';
        }

        async function initAuth() {
            const { data: { session } } = await db.auth.getSession();
            if (session) {
                await checkAdminUser(session.user.id);
            }
        }

        function togglePass() {
            const input = document.getElementById('login-password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        initAuth();
    </script>
</body>
</html>
